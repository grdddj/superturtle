name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: super_turtle/claude-telegram-bot
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun run check:bun-version
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: super_turtle/claude-telegram-bot
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      # Uses the same deterministic verification command locally and in CI.
      # Tests gated behind CODEX_INTEGRATION=1 are automatically skipped
      # (see mcp-transport.test.ts).
      - run: bun run verify:ci

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest
      - run: PYTHONPATH=. python -m pytest -q super_turtle/subturtle/tests
      - run: PYTHONPATH=. python -m unittest super_turtle/state/test_run_state_writer.py -v

  npm-package-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: super_turtle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bash tests/npm-package-smoke.sh

  init-non-destructive:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: super_turtle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bash tests/init-non-destructive.sh

  # ---------------------------------------------------------------------------
  # Codex integration tests (expensive — needs CLI + API key)
  #
  # Disabled by default. To enable, add OPENAI_API_KEY as a repository secret
  # and uncomment this job. Requires a macOS runner with Codex CLI installed.
  #
  # Cost: ~$0.01-0.05 per run.
  # ---------------------------------------------------------------------------
