<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tadeáš je legenda</title>
    <style>
      :root {
        --bg: #f7efe2;
        --bg-accent: #f2c078;
        --card: rgba(255, 252, 247, 0.8);
        --text: #1b1713;
        --muted: #5c5246;
        --border: rgba(27, 23, 19, 0.12);
        --shadow: 0 30px 80px rgba(87, 53, 22, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 36%),
          radial-gradient(circle at bottom right, rgba(242, 192, 120, 0.65), transparent 34%),
          linear-gradient(135deg, var(--bg) 0%, #f4e6d2 45%, #efd8b9 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.24);
        filter: blur(8px);
        pointer-events: none;
      }

      body::before {
        width: 28rem;
        height: 28rem;
        top: -8rem;
        right: -8rem;
      }

      body::after {
        width: 20rem;
        height: 20rem;
        bottom: -6rem;
        left: -6rem;
      }

      main {
        width: min(92vw, 52rem);
        padding: 2rem;
      }

      .card {
        position: relative;
        padding: clamp(2rem, 5vw, 4rem);
        border: 1px solid var(--border);
        border-radius: 2rem;
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        display: inline-block;
        margin: 0 0 1rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: rgba(242, 192, 120, 0.22);
        color: var(--muted);
        font-size: 0.82rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 12ch;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 0.92;
        letter-spacing: -0.05em;
      }

      p {
        max-width: 34rem;
        margin: 1.4rem 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.25rem);
        line-height: 1.6;
      }

      .accent {
        color: #8b4e17;
      }

      @media (max-width: 640px) {
        .card {
          border-radius: 1.5rem;
        }

        h1 {
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <span class="eyebrow">Super Turtle Demo</span>
        <h1>Tadeáš je <span class="accent">legenda</span>.</h1>
        <p>
          Minimal demo page served from the local workspace and exposed through a
          public tunnel.
        </p>
      </section>
    </main>
  </body>
  </html>
